name: Daily Stock Screener

on:
  schedule:
    - cron: "30 0 * * 1-5"
    - cron: "5 6 * * 1-5"
    - cron: "0 22 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "morning / tw_close / us_close"
        required: false
        default: "morning"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Set mode
        id: mode
        run: |
          HOUR=$(date -u +%H)
          INPUT="${{ github.event.inputs.mode }}"
          if [ -n "$INPUT" ]; then
            echo "mode=$INPUT" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "00" ]; then
            echo "mode=morning" >> $GITHUB_OUTPUT
          elif [ "$HOUR" = "06" ]; then
            echo "mode=tw_close" >> $GITHUB_OUTPUT
          else
            echo "mode=us_close" >> $GITHUB_OUTPUT
          fi

      - name: Run screener
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MODE: ${{ steps.mode.outputs.mode }}
        run: python screener.py
